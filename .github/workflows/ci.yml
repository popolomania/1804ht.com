name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  lint-and-build:
    name: Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc --noEmit)
        run: npm run check

      - name: Build
        run: npm run build
